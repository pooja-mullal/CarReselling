    color: white;

}

.like-icon.liked {
    color: red;

   <body>
      <!-- header section start -->

            <nav class="navbar navbar-expand-lg navbar-light bg-light">
               <a class="navbar-brand"href="index.html" style="color: white;font-size: 30px;"><b>CarResell</b></a>

               <span class="navbar-toggler-icon"></span>
               </button>
               <div class="collapse navbar-collapse" id="navbarSupportedContent">
                  <ul class="navbar-nav ml-auto">
                     <li class="nav-item">
                        <a class="nav-link" href="/user_db">Home</a>
                     </li>
                     <li class="nav-item">
                        <a class="nav-link" href="/booking_details">Booking Details</a>
                     </li>
                     <li class="nav-item">
                        <a class="nav-link" href="/liked_car">Liked cars</a>
                     </li>

                     <li class="nav-item">
                        <a class="nav-link" href="/user_logout">Log out</a>
                     </li>
                  </ul>
                  <form class="form-inline my-2 my-lg-0">
                  </form>
               </div>
            </nav>
         </div>
      </div>
      <!-- header section end -->

      <!-- banner section start -->

      <!-- banner section end -->
      <!-- about section start -->
      <div class="about_section layout_padding">
         <div class="container">
            <div class="about_section_2">
               <div class="row">

                <div class="col-md-12" style="margin-bottom: 40px;">
                    <div class="about_taital_box">
                        <h1 class="about_taital">Liked <span style="color: #fe5b29;">Cars</span> - <p>Explore our collection of cars available for purchase.</p></h1>

                    </div>
               </div>

               <br><br>
            </div>
         </div>
      </div>
      <!-- about section end -->

    <!-- gallery section start -->
    <div class="gallery_section layout_padding" style="padding-top: 0px;">
        <div class="container">

            <div class="gallery_section_2" style="margin-top: 0px; padding-top: 0px;">
                <div class="row">
                    {% for bike in data %}
                    <div class="col-md-4" style="margin-bottom: 15px;">
                        <div class="gallery_box">
                            <div class="gallery_img">
                                <img src="{{ bike.image.url }}" alt="{{ bike.bike_name }}" class="img-fluid">
                            </div>
                            <h3 class="types_text">{{ bike.bike_name }}</h3>
                            <p class="looking_text">Price: {{ bike.price }}</p>
                            <p style="text-align: center;">{{ bike.year }}</p>
                            <div class="read_bt"><a href="/single_bike/{{ bike.id }}/{{ bike.user_id_id }}">View Details</a></div>
                            {% if bike.is_liked %}
                            <i class="fa fa-heart like-icon liked" data-bike-id="{{ bike.id }}"></i>
                            {% else %}
                            <i class="fa fa-heart like-icon" data-bike-id="{{ bike.id }}"></i>
                            {% endif %}
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
    $(document).ready(function() {
        $('.like-icon').click(function() {
            var icon = $(this);
            var bikeId = icon.data('bike-id');
            var url = icon.hasClass('liked') ? '/unlike_bike/' : '/like_bike/';

            $.ajax({
                url: url,
                method: 'POST',
                data: {
                    bike_id: bikeId,
                    csrfmiddlewaretoken: '{{ csrf_token }}'
                },
                success: function(response) {
                    if (response.status === 'liked') {
                        icon.addClass('liked');
                    } else if (response.status === 'unliked') {
                        icon.removeClass('liked');
                    }
                }
            });
        });
    });
    </script>
