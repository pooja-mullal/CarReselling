<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Profile</title>
        <style>
             *{
                margin: 5px;
                padding: 5px;
                box-sizing: border-box;
                font-family: 'Poppins', sans-serif;
            }
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                background-color: #fff;
            }
            .wrapper{
                position:relative;
                width: 450px;
                height: 460px;
                background-color: #ccc;
                border-radius: 20px;
                padding: 40px;
            }
            .form-wrapper{
                display: flex;
                justify-content: center;
                align-items: center;
                width: 100%;
                height: 100%;
            }

            h1 {
                font-size: 30px;
                color: black;
                text-align: center;
            }

            p{
                font-size: 17px;
                color: black;
                text-align: center;
                border: 2px solid black;
                padding: 25px;
                border-radius: 20px;
            }
        </style>
    </head>
    <body>
        <div class="wrapper">
            <div class="form-wrapper sign-in">
                <form action="">
                    {% csrf_token %}
                    <h1>Profile</h1>
                    <center><h1 class="title" Seller profile></h1>
                    <p>Username: {{user.username}}</p>
                    <p>Full Name : {{user.first_name}}</p>
                    <p>Contact : {{user.contact_no}}</p>
                    <p>email : {{user.email}}</p></center>
                </form>
            </div>
    </body>
</html>
